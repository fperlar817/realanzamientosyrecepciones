<div class="exe-text-template">
    <p>Línea temporal del proyecto estructurada en <strong>9 sesiones</strong>:</p>
<p><strong>Sesión 1</strong>: Presentación del proyecto y juegos de lanzamiento.</p>
<p><strong>Sesión 2:</strong> Lanzamientos de precisión.</p>
<p><strong>Sesión 3</strong>: Recepciones cooperativas.</p>
<p><strong>Sesión 4:</strong> Juegos con dianas y bolos.</p>
<p><strong>Sesión 5</strong>: Iniciación al Datchball.</p>
<p><strong>Sesión 6:</strong> Iniciación al Twicon.</p>
<p><strong>Sesión 7</strong>: Circuitos y estaciones rotativas.</p>
<p><strong>Sesión 8</strong>: Preparación del torneo.</p>
<p><strong>Sesión 9:</strong> Gran Torneo de Puntería</p>
